<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Plateforme véhicules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <header class="d-flex justify-content-between align-items-center p-3 bg-white border-bottom">
        <a href="pagePrincipale.html" class="text-decoration-none text-dark fw-bold">
            <i class="bi bi-arrow-left me-1"></i> Retour
        </a>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow-sm">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-1">Créer un compte</h2>
                        <p class="text-center text-muted mb-4">Rejoignez la plateforme gratuitement</p>

                        <div id="msg-erreur" class="alert alert-danger d-none"></div>

                        <div id="f-login" class="mb-3">
                            <label class="form-label fw-semibold">Login</label>
                            <input type="text" class="form-control" id="login" placeholder="Votre login">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="votre@email.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mot de passe</label>
                            <input type="password" class="form-control" id="password" placeholder="Votre mot de passe">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirmer le mot de passe</label>
                            <input type="password" class="form-control" id="confirm-password"
                                placeholder="Répétez le mot de passe">
                        </div>

                        <button class="btn btn-dark w-100" onclick="createAccount()">
                            <i class="bi me-1"></i> S'inscrire
                        </button>

                        <hr class="my-3">

                        <p class="text-center text-muted mb-0">
                            Déjà un compte ?
                            <a href="pageConnexion.html" class="text-dark fw-semibold">Se connecter</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
        <script src="/Frontend/Js/creerCompte.js"></script>
    </main>
